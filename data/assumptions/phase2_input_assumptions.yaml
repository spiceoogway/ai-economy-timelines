h100_equivalent_shipments:
  unit: units
  scenarios:
    base:
      source: author_synthesis
      confidence: medium
      milestones:
      - {year: 2024, value: 3500000.0, notes: '2024 actual: NVIDIA H100/H200 ~2M (Epoch
          median 1.5-2M) + AMD/TPU/Trainium/China ~1.5M H100-eq.', source: author_synthesis_from_epoch_2024_scaling}
      - {year: 2025, value: 6500000.0, notes: '2025 actual: B200 ramp + GB200 + AMD
          MI325. NVIDIA DC revenue ~$200B implies ~5M H100e, total ~6.5M H100e.'}
      - {year: 2026, value: 11000000.0, notes: '2026 projection: continued B200/GB200
          ramp + Rubin in Q4 + TPU v7. ~70% YoY.'}
      - {year: 2030, value: 60000000.0, notes: 'Epoch 2030 stock 20-400M H100e median
          100M. With 5y lifetime base, annual shipments ~50-70M.', source: epoch_2024_scaling}
      - {year: 2040, value: 250000000.0, notes: 2040 extrapolation slowing to ~15%
          CAGR post-2030., confidence: low}
    chip_bottleneck:
      source: author_synthesis
      confidence: medium
      milestones:
      - {year: 2024, value: 3500000.0, source: author_synthesis_from_epoch_2024_scaling}
      - {year: 2025, value: 5000000.0, notes: Slower B200 ramp due to CoWoS / HBM
          constraints (Epoch identifies these as primary).}
      - {year: 2026, value: 7000000.0, notes: 40% YoY (constrained)., confidence: low}
      - {year: 2030, value: 20000000.0, notes: Epoch 2030 lower-bound 20M H100e.,
        source: epoch_2024_scaling}
      - {year: 2040, value: 80000000.0, confidence: low}
    power_dc_bottleneck:
      source: author_synthesis
      confidence: medium
      milestones:
      - {year: 2024, value: 3500000.0, notes: 'Same as base, chips abundant.', source: author_synthesis_from_epoch_2024_scaling}
      - {year: 2025, value: 6500000.0}
      - {year: 2026, value: 11000000.0}
      - {year: 2030, value: 60000000.0, source: epoch_2024_scaling}
      - {year: 2040, value: 250000000.0, confidence: low}
    capex_rich:
      source: author_synthesis
      confidence: medium
      milestones:
      - {year: 2024, value: 3500000.0, source: author_synthesis_from_epoch_2024_scaling}
      - {year: 2025, value: 7500000.0, notes: Higher with Stargate-class spend pulling
          demand forward.}
      - {year: 2026, value: 14000000.0, confidence: low}
      - {year: 2030, value: 150000000.0, notes: Toward Epoch's upper-end 100-400M.,
        source: epoch_2024_scaling}
      - {year: 2040, value: 500000000.0, confidence: low}
