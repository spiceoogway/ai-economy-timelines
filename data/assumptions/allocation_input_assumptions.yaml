# Allocation-layer input assumptions.
#
# Four scenarios; each defines milestone-year shares for the 6 buckets,
# plus the three training-pool decomposition parameters
# (frontier_lab_training_share, largest_run_concentration,
# cluster_contiguity_factor). Linearly interpolated between milestones.
#
# Validation invariants enforced by model.allocation_engine.validate:
# - The 6 bucket shares sum to 1.0 (±1e-6) at every milestone
# - All shares ∈ [0, 1]
# - Every share is non-negative
#
# Source: scope_defaults (the values from the upstream phase-3 scope).
# Confidence: medium for 2024 base values, low for 2030+ trajectories.
# These should be revisited with hyperscaler / lab disclosures and
# academic estimates of the largest-run concentration parameter.

scenarios:

  allocation_base:
    description: Central allocation scenario; inference dominates but training remains material.
    confidence: medium
    source: scope_defaults
    milestones:
